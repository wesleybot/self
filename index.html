<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TQC AI 練習系統</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="quiz-container">

    <!-- 1. 登入畫面 -->
    <div id="login-screen">
      <h2>請先登入</h2>
      <input type="text" id="username-input" placeholder="輸入使用者名稱">
      <button id="login-btn">登入</button>
      <p id="login-error" style="color:red; display:none;">帳號不存在，請重試。</p>
    </div>

    <!-- 2. 類別選單：預設隱藏 -->
    <div id="category-select" style="display:none">
      <h2>選擇練習類別</h2>
      <div id="categories"></div>
    </div>

    <!-- 3. 測驗本體：預設隱藏 -->
    <div id="quiz" style="display:none">
      <!-- 出題區 -->
      <div id="quiz-screen">
        <button id="home-btn">⬅ 返回主頁</button>
        <div id="question"></div>
        <div id="question-image"></div>
        <div id="options"></div>
        <button id="prev-btn" style="display:none">上一題</button>
        <button id="next-btn" style="display:none">下一題</button>
      </div>
      <!-- 結果區 -->
      <div id="result-screen" style="display:none; padding:20px;">
        <h2>測驗結束</h2>
        <p id="final-score"></p>
        <button id="review-btn">查看答題回顧</button>
        <button id="again-btn">重做本類</button>
        <button id="home2-btn">返回主頁</button>
        <div id="review" style="margin-top:20px;"></div>
      </div>
    </div>

  </div>
  <script src="js/app.js"></script>
</body>
</html>
